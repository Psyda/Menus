<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Menu Router</title>
<script>
  // ── ROUTER ─────────────────────────────────────────────────────
  // ?page=<client><n>  →  <client>/page<n>.html   (e.g. ?page=pinecone2)
  // Clients are defined in clients.json; unknown keys show the launcher.
  const param = new URLSearchParams(window.location.search).get("page");
  const m = param && /^([a-z0-9-]+?)(\d+)$/.exec(param);
  if (m) {
    // Hard navigate — no history entry, TV gets the real file URL
    window.location.replace(m[1] + "/page" + m[2] + ".html");
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #08090c; color: #eef0f4;
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 45% at 10% 15%, rgba(0,232,124,0.05) 0%, transparent 65%),
      radial-gradient(ellipse 55% 40% at 90% 85%, rgba(176,110,243,0.04) 0%, transparent 65%);
  }
  .screen {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px; padding: 40px;
    overflow-y: auto;
  }
  .heading { text-align: center; }
  .heading-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: .3em; text-transform: uppercase;
    color: rgba(238,240,244,0.3);
    margin-bottom: 8px;
  }
  .heading-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; letter-spacing: .1em;
    color: #eef0f4; line-height: 1;
  }
  .clients {
    display: flex; flex-direction: column; gap: 28px;
    width: 100%; max-width: 820px;
  }
  .client-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: .28em; text-transform: uppercase;
    color: rgba(238,240,244,0.28);
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .client-pages {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .page-btn {
    display: flex; flex-direction: column; gap: 4px;
    padding: 16px 20px;
    background: #0f1116;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color .2s, background .2s;
    border-top: 2px solid;
    color: var(--accent);
    border-top-color: var(--accent);
  }
  .page-btn:hover { background: #141720; border-color: currentColor; }
  .btn-page {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: .1em; line-height: 1;
  }
  .btn-url {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: .1em;
    color: rgba(238,240,244,0.25);
    margin-top: 4px;
  }
  .admin-link {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
    color: rgba(238,240,244,0.35);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 8px 22px;
  }
  .admin-link:hover { color: #eef0f4; border-color: rgba(255,255,255,0.3); }
  .error-box {
    display: none;
    background: #1a0f0f;
    border: 1px solid rgba(248,113,113,0.25);
    border-left: 4px solid #f87171;
    border-radius: 8px;
    padding: 16px 22px;
    max-width: 820px; width: 100%;
    text-align: center;
  }
  .error-box.visible { display: block; }
  .error-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase;
    color: #f87171; margin-bottom: 6px;
  }
  .error-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 600;
    color: #fbbf24; word-break: break-all;
  }
</style>
</head>
<body>
<div class="screen">

  <div class="heading">
    <div class="heading-label">Digital Signage — Menu Router</div>
    <div class="heading-title">Select a Display</div>
  </div>

  <div class="error-box" id="errorBox">
    <div class="error-label">Unknown page key</div>
    <div class="error-val" id="errorVal"></div>
  </div>

  <div class="clients" id="clients"></div>

  <a class="admin-link" href="admin/">Menu Editor →</a>

</div>

<script>
  fetch('clients.json?t=' + Date.now())
    .then(r => r.json())
    .then(cfg => {
      const wrap = document.getElementById('clients');
      const valid = {};
      cfg.clients.forEach(c => {
        const block = document.createElement('div');
        block.className = 'client-block';
        block.style.setProperty('--accent', c.accent || '#00e87c');
        const label = document.createElement('div');
        label.className = 'client-label';
        label.textContent = c.name;
        block.appendChild(label);
        const pages = document.createElement('div');
        pages.className = 'client-pages';
        for (let n = 1; n <= (c.screens || 3); n++) {
          valid[c.id + n] = 1;
          const a = document.createElement('a');
          a.className = 'page-btn';
          a.href = '?page=' + c.id + n;
          a.style.setProperty('--accent', c.accent || '#00e87c');
          const t = document.createElement('div');
          t.className = 'btn-page';
          t.textContent = 'Screen ' + n;
          const u = document.createElement('div');
          u.className = 'btn-url';
          u.textContent = '?page=' + c.id + n;
          a.appendChild(t); a.appendChild(u);
          pages.appendChild(a);
        }
        block.appendChild(pages);
        wrap.appendChild(block);
      });
      const p = new URLSearchParams(window.location.search).get('page');
      if (p && !valid[p]) {
        document.getElementById('errorVal').textContent = '?page=' + p + ' — no matching route';
        document.getElementById('errorBox').classList.add('visible');
      }
    });
</script>
</body>
</html>
