<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>404 — Green Room Debug</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #08090c; color: #eef0f4; font-family: 'Barlow', sans-serif; }

  .screen {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px; padding: 40px;
    position: relative;
  }

  .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: .25em; text-transform: uppercase;
    color: rgba(238,240,244,0.35);
  }

  .big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 96px);
    letter-spacing: .06em; color: #f87171;
    line-height: 1;
  }

  .url-box {
    background: #0f1116;
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 4px solid #f87171;
    border-radius: 8px;
    padding: 20px 28px;
    max-width: 900px; width: 100%;
    text-align: center;
  }

  .url-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(238,240,244,0.35);
    margin-bottom: 10px;
  }

  .url-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(18px, 3vw, 32px);
    font-weight: 600; letter-spacing: .04em;
    color: #fbbf24;
    word-break: break-all;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 900px; width: 100%;
  }

  .info-cell {
    background: #0f1116;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 14px 20px;
  }

  .info-cell .k {
    font-size: 10px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    color: rgba(238,240,244,0.3);
    margin-bottom: 6px;
  }

  .info-cell .v {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 600;
    letter-spacing: .04em; color: #eef0f4;
    word-break: break-all;
  }

  .note {
    font-size: 12px; color: rgba(238,240,244,0.3);
    letter-spacing: .05em; text-align: center;
    max-width: 600px; line-height: 1.7;
  }
</style>
</head>
<body>
<div class="screen">

  <div>
    <div class="label">Green Room Digital Signage</div>
    <div class="big">404 — Not Found</div>
  </div>

  <div class="url-box">
    <div class="url-label">Attempted URL</div>
    <div class="url-value" id="attempted-url">—</div>
  </div>

  <div class="info-grid">
    <div class="info-cell">
      <div class="k">Origin</div>
      <div class="v" id="info-origin">—</div>
    </div>
    <div class="info-cell">
      <div class="k">Pathname</div>
      <div class="v" id="info-path">—</div>
    </div>
    <div class="info-cell">
      <div class="k">Search / Query String</div>
      <div class="v" id="info-search">—</div>
    </div>
    <div class="info-cell">
      <div class="k">Referrer</div>
      <div class="v" id="info-referrer">—</div>
    </div>
  </div>

  <div class="note">
    This page is only shown when GitHub Pages cannot find the requested file.<br/>
    Check that the filename and path above exactly match what exists in your repo.
  </div>

</div>

<script>
  const loc = window.location;
  document.getElementById('attempted-url').textContent  = loc.href;
  document.getElementById('info-origin').textContent    = loc.origin   || '—';
  document.getElementById('info-path').textContent      = loc.pathname || '—';
  document.getElementById('info-search').textContent    = loc.search   || '(none)';
  document.getElementById('info-referrer').textContent  = document.referrer || '(none)';
</script>
</body>
</html>
