<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   KIOSK MENU — Responsive 16:9
   Scales to fill any screen via vw/vh units.
   
   Route: ?page=1 (Breakfast), ?page=2 (Adverts), ?page=3 (Lunch)
   
   IMAGE HOSTING:
   Put product photos in your GitHub Pages repo under /images/
   Reference as: images/full-breakfast.jpg (relative path)
   ============================================================ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #141210;
  --bg-card: #1C1A17;
  --bg-subtle: #252220;
  --gold: #C9A54E;
  --gold-dim: #9A7A35;
  --gold-glow: #D4B96A;
  --text-primary: #F0EBE0;
  --text-secondary: #B5AFA3;
  --text-dim: #7A756B;
  --text-price: #D4B96A;
  --rule: rgba(201, 165, 78, 0.12);
  --rule-strong: rgba(201, 165, 78, 0.25);

  --font-display: 'Cormorant Garamond', 'Georgia', serif;
  --font-body: 'Outfit', 'Segoe UI', sans-serif;
}

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* Subtle grain */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.screen { display: none; width: 100vw; height: 100vh; position: relative; }
.screen.active { display: flex; }

/* ── Top bar ── */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 7vh;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  background: linear-gradient(180deg, var(--bg-primary) 40%, transparent 100%);
}

.top-bar h1 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(18px, 2vw, 32px);
  color: var(--gold);
  letter-spacing: 0.4em;
  text-transform: uppercase;
}

.top-bar .diamond {
  width: clamp(4px, 0.4vw, 7px);
  height: clamp(4px, 0.4vw, 7px);
  background: var(--gold);
  transform: rotate(45deg);
  margin: 0 clamp(10px, 1.2vw, 24px);
  opacity: 0.5;
}

/* ── Bottom bar ── */
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4vh;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(0deg, var(--bg-primary) 30%, transparent 100%);
}

.bottom-bar span {
  font-size: clamp(8px, 0.7vw, 12px);
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ============================================================
   MENU LAYOUT
   ============================================================ */
.menu-screen {
  flex-direction: column;
  padding: 8vh 4vw 5vh;
}

.menu-columns {
  flex: 1;
  display: flex;
  gap: 2.5vw;
  padding-top: 1vh;
  overflow: hidden;
}

.menu-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.section-label {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: clamp(9px, 0.75vw, 14px);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.8vh;
  padding-bottom: 1.2vh;
  border-bottom: 1px solid var(--rule-strong);
}

.menu-item-block {
  padding: 1.1vh 0;
  border-bottom: 1px solid var(--rule);
  animation: fadeInUp 0.5s ease both;
}

.menu-item-block:last-child { border-bottom: none; }

.menu-item {
  display: flex;
  align-items: baseline;
}

.item-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(15px, 1.3vw, 26px);
  color: var(--text-primary);
  white-space: nowrap;
}

.item-dots {
  flex: 1;
  border-bottom: 1px dotted var(--text-dim);
  margin: 0 clamp(6px, 0.7vw, 14px);
  min-width: 10px;
  position: relative;
  top: -0.3em;
  opacity: 0.35;
}

.item-price {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: clamp(13px, 1.05vw, 20px);
  color: var(--text-price);
  white-space: nowrap;
}

.item-desc {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: clamp(10px, 0.75vw, 15px);
  color: var(--text-secondary);
  padding: 0.4vh 0 0.3vh;
  line-height: 1.5;
}

.item-addons {
  font-family: var(--font-display);
  font-style: italic;
  font-size: clamp(9px, 0.7vw, 14px);
  color: var(--text-dim);
  padding-top: 0.2vh;
}

.col-divider {
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, var(--rule-strong) 10%, var(--rule-strong) 90%, transparent 100%);
}

/* ============================================================
   ADVERTS SLIDESHOW
   ============================================================ */
.advert-screen {
  position: relative;
  background: var(--bg-primary);
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.slide.active { opacity: 1; }

.slide-image {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  position: absolute;
  inset: 0;
}

.slide.active .slide-image {
  animation: kenBurns var(--slide-duration) ease-out forwards;
}

.slide-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    100deg,
    transparent 0%,
    transparent 40%,
    rgba(20,18,16,0.4) 55%,
    rgba(20,18,16,0.82) 75%,
    rgba(20,18,16,0.96) 100%
  );
  z-index: 1;
}

.slide-overlay::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 15vh;
  background: linear-gradient(0deg, rgba(20,18,16,0.7) 0%, transparent 100%);
}

.slide-content {
  position: absolute;
  right: 5vw;
  top: 50%;
  transform: translateY(-50%);
  width: clamp(280px, 28vw, 520px);
  z-index: 2;
  text-align: right;
}

.slide-tag {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: clamp(9px, 0.7vw, 13px);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.5vh;
}

.slide-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(28px, 3.2vw, 62px);
  line-height: 1.05;
  color: var(--text-primary);
  margin-bottom: 1.5vh;
}

.slide-desc {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: clamp(12px, 1vw, 20px);
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 2.5vh;
}

.slide-price {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(22px, 2.4vw, 46px);
  color: var(--gold-glow);
}

.progress-track {
  position: absolute;
  bottom: 3.5vh;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: clamp(4px, 0.5vw, 10px);
  z-index: 10;
}

.progress-pip {
  width: clamp(24px, 2.5vw, 48px);
  height: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.progress-pip.active::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0%;
  background: var(--gold);
  border-radius: 2px;
  animation: progressFill var(--slide-duration) linear forwards;
}

@keyframes progressFill { from { width: 0%; } to { width: 100%; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes kenBurns { from { transform: scale(1); } to { transform: scale(1.05); } }

.menu-item-block:nth-child(1) { animation-delay: 0.04s; }
.menu-item-block:nth-child(2) { animation-delay: 0.08s; }
.menu-item-block:nth-child(3) { animation-delay: 0.12s; }
.menu-item-block:nth-child(4) { animation-delay: 0.16s; }
.menu-item-block:nth-child(5) { animation-delay: 0.20s; }
.menu-item-block:nth-child(6) { animation-delay: 0.24s; }
.menu-item-block:nth-child(7) { animation-delay: 0.28s; }
.menu-item-block:nth-child(8) { animation-delay: 0.32s; }
.menu-item-block:nth-child(9) { animation-delay: 0.36s; }
.menu-item-block:nth-child(10) { animation-delay: 0.40s; }
</style>
</head>
<body>

<div id="screen-breakfast" class="screen menu-screen">
  <div class="top-bar"><div class="diamond"></div><h1>Breakfast</h1><div class="diamond"></div></div>
  <div class="menu-columns" id="breakfast-columns"></div>
  <div class="bottom-bar"><span>Prices subject to applicable taxes</span></div>
</div>

<div id="screen-adverts" class="screen advert-screen">
  <div id="slideshow"></div>
  <div class="progress-track" id="progress-track"></div>
</div>

<div id="screen-lunch" class="screen menu-screen">
  <div class="top-bar"><div class="diamond"></div><h1>Lunch</h1><div class="diamond"></div></div>
  <div class="menu-columns" id="lunch-columns"></div>
  <div class="bottom-bar"><span>Prices subject to applicable taxes</span></div>
</div>

<script>
/* ============================================================
   ★ EDIT MENU DATA HERE ★
   ============================================================ */

const SLIDE_DURATION = 7000;

const breakfastSections = [
  {

    items: [
      { name: "Full Breakfast", price: "$16.00", desc: "2 eggs, bacon or sausage, potatoes, beans, toast" },
      { name: "Breakfast Wrap", price: "$14.00", desc: "Egg, cheese, bacon, sausage, mushroom, green pepper, onions, mayo or salsa" },
      { name: "3 Egg Omelette", price: "$12.00", desc: "Served with home fries & toast", addons: "Cheese $2.50 · Protein $3.00 · Veggies $2.00 · Extra Egg $2.00" },
    ]
  },
  {
    label: "Light Bites",

      { name: "BLT", price: "$7.00", desc: "White bread, brown bread, bagel, or English muffin" },
    ]
  }
];

const lunchSections = [
  {
    label: "Burgers & Sandwiches",
    items: [
      { name: "Island Burger", price: "$22.50", desc: "Thousand Island, caramelized onions, mushrooms, bacon, cheddar" },
      { name: "B.B.Q Burger", price: "$22.50", desc: "BBQ sauce, pulled pork, bacon, Havarti, fried onions" },
      { name: "Bacon Marmalade Burger", price: "$20.00", desc: "Spicy mayo, bacon jam, Havarti, onion rings" },
      { name: "Mozzarella Melt Burger", price: "$19.50", desc: "Marinara, pepperoni spread, Swiss, mozzarella sticks" },
      { name: "Po Boy Sandwich", price: "$25.00", desc: "Fried shrimp, lettuce, tomato, pickles, remoulade" },
      { name: "Pulled Pork Sandwich", price: "$20.00", desc: "Topped with coleslaw" },
      { name: "Steak & Pepperoni", price: "$19.50", desc: "Steak, pepperoni, lettuce, tomato, caramelized onions" },
      { name: "Chicken Sandwich", price: "$18.00", desc: "Coleslaw, spicy mayo, pickles" },
    ]
  },
  {
    label: "Tacos",
    items: [
      { name: "Bacon Shrimp Taco (3)", price: "$22.50", desc: "Bacon-wrapped shrimp, guacamole, pineapple salsa" },

    ]
  },
  {
    label: "Sides & Snacks",
    items: [

      { name: "Chicken Tenders (5)", price: "$12.00" },
      { name: "Popcorn Chicken", price: "$10.00" },
      { name: "Onion Rings", price: "$9.00" },
      { name: "Fries", price: "Sm $5 | Lg $8.50" },
      { name: "Cheese Sticks (4)", price: "$8.00" },
      { name: "Pizza Slice", price: "$5.00" },
      { name: "Pogos", price: "$4.00" },
      { name: "Hot Dog", price: "$3.75" },
    ]
  }
];

const advertSlides = [
  {
    image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1920&q=80",
    tag: "Fan Favourite",
    title: "Island Burger",
    desc: "Thousand Island dressing, caramelized onions, roasted mushrooms, bacon, and melted cheddar.",

  },
  {

    tag: "Breakfast",
    title: "Full Breakfast",
    desc: "Two eggs any style with bacon or sausage, crispy potatoes, beans, and toast.",
    price: "$16.00"
  },
  {
    image: "images/bacon-marm-burger.png",
    tag: "New",
    title: "Bacon Marmalade Burger",
    desc: "Spicy mayo, house-made bacon jam, Havarti cheese, golden onion rings.",
    price: "$20.00"
  },
  {
    image: "https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=1920&q=80",
    tag: "Tacos",
    title: "Bacon Shrimp Tacos",
    desc: "Bacon-wrapped shrimp, spicy mayo, fresh guacamole, pineapple salsa, pickled onions.",
    price: "$22.50"
  },
  {
    image: "https://images.unsplash.com/photo-1484723091739-30a097e8f929?w=1920&q=80",
    tag: "Breakfast",
    title: "French Toast",
    desc: "Three slices of thick-cut golden French toast. A morning classic.",
    price: "$10.00"
  },
  {
    image: "https://images.unsplash.com/photo-1513185158878-8d8c2a2a3da3?w=1920&q=80",
    tag: "Crispy & Golden",
    title: "Poutine",
    desc: "Fresh-cut fries, squeaky cheese curds, rich brown gravy.",
    price: "From $10.00"
  },
];

/* ============================================================
   RENDER ENGINE
   ============================================================ */

function renderItem(item) {
  let html = `<div class="menu-item-block">
    <div class="menu-item">
      <span class="item-name">${item.name}</span>
      <span class="item-dots"></span>
      <span class="item-price">${item.price}</span>
    </div>`;
  if (item.desc) html += `<div class="item-desc">${item.desc}</div>`;
  if (item.addons) html += `<div class="item-addons">${item.addons}</div>`;
  html += `</div>`;
  return html;
}

function renderMenuScreen(containerId, sections) {
  const container = document.getElementById(containerId);
  const blocks = [];
  sections.forEach(section => {
    blocks.push({ type: 'label', html: `<div class="section-label">${section.label}</div>`, height: 48 });
    section.items.forEach(item => {
      let h = 46;
      if (item.desc) h += 24;
      if (item.addons) h += 20;
      blocks.push({ type: 'item', html: renderItem(item), height: h });
    });
  });

  const total = blocks.reduce((s, b) => s + b.height, 0);
  const target = total / 2;
  let col1 = '', col2 = '', accum = 0, split = false;

  blocks.forEach(block => {
    if (!split && accum >= target * 0.8 && block.type === 'label') split = true;
    if (!split) { col1 += block.html; accum += block.height; }
    else col2 += block.html;
  });

  if (!split) {
    col1 = ''; col2 = ''; accum = 0;
    blocks.forEach(block => {
      if (accum < target) col1 += block.html; else col2 += block.html;
      accum += block.height;
    });
  }

  container.innerHTML = `
    <div class="menu-col">${col1}</div>
    <div class="col-divider"></div>
    <div class="menu-col">${col2}</div>`;
}

function renderSlideshow() {
  const container = document.getElementById('slideshow');
  const track = document.getElementById('progress-track');
  document.documentElement.style.setProperty('--slide-duration', SLIDE_DURATION + 'ms');

  container.innerHTML = advertSlides.map((s, i) => `
    <div class="slide ${i === 0 ? 'active' : ''}">
      <div class="slide-image" style="background-image:url('${s.image}')"></div>
      <div class="slide-overlay"></div>
      <div class="slide-content">
        <div class="slide-tag">${s.tag}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-desc">${s.desc}</div>
        <div class="slide-price">${s.price}</div>
      </div>
    </div>`).join('');

  track.innerHTML = advertSlides.map((_, i) =>
    `<div class="progress-pip ${i === 0 ? 'active' : ''}"></div>`).join('');

  let cur = 0;
  setInterval(() => {
    const slides = container.querySelectorAll('.slide');
    const pips = track.querySelectorAll('.progress-pip');
    slides[cur].classList.remove('active');
    pips[cur].classList.remove('active');
    cur = (cur + 1) % advertSlides.length;
    slides[cur].classList.add('active');
    const old = pips[cur], fresh = old.cloneNode(true);
    fresh.classList.add('active');
    old.parentNode.replaceChild(fresh, old);
  }, SLIDE_DURATION);
}

function init() {
  const page = parseInt(new URLSearchParams(window.location.search).get('page') || '1');
  renderMenuScreen('breakfast-columns', breakfastSections);
  renderMenuScreen('lunch-columns', lunchSections);
  renderSlideshow();
  const map = { 1: 'screen-breakfast', 2: 'screen-adverts', 3: 'screen-lunch' };
  document.getElementById(map[page] || map[1]).classList.add('active');
}

init();
</script>
